version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: interviewlens-db
    environment:
      POSTGRES_USER: interviewlens
      POSTGRES_PASSWORD: interviewlens_secret
      POSTGRES_DB: interviewlens
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interviewlens"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: interviewlens-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # Fallback for CPU-only systems: remove the deploy block above

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: interviewlens-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://interviewlens:interviewlens_secret@postgres:5432/interviewlens
      - OLLAMA_HOST=http://ollama:11434
      - SANDBOX_ENABLED=true
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    privileged: true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: interviewlens-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
  ollama_data:
